
services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15
    container_name: civicfix_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend API Service
  server:
    build: ./server
    container_name: civicfix_server
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./server:/app
      - /app/node_modules

  # 3. Web App Service
  web:
    build: ./web
    container_name: civicfix_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pgdata: