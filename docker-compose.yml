
services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:15
    container_name: civicfix_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend API Service
  server:
    build: ./server
    container_name: civicfix_server
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - PORT=5001
      - APP_URL=${APP_URL}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    ports:
      - "5001:5001"

    command: sh -c "npx prisma generate && npm run dev"
    volumes:
      - ./server:/app
      - /app/node_modules

  # 3. Web App Service
  web:
    build: ./web
    container_name: civicfix_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pgdata: